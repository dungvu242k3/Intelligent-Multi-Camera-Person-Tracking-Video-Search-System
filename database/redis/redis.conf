# =====================================================
# Redis Production Configuration
# Multi-Camera Person Tracking System
# =====================================================

# --- Network ---
bind 0.0.0.0
protected-mode yes
port 6379

# --- General ---
daemonize no
supervised no
loglevel notice
logfile ""

# --- Memory Management ---
maxmemory 512mb
maxmemory-policy allkeys-lru
maxmemory-samples 10

# --- Persistence: AOF (Append-Only File) ---
# Enables durable write log; safe for rate-limit counters and session cache
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-use-rdb-preamble yes

# --- Persistence: RDB Snapshot (backup) ---
save 900 1
save 300 10
save 60 10000
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb

# --- Slow Log ---
slowlog-log-slower-than 10000
slowlog-max-len 128

# --- Connection ---
timeout 300
tcp-keepalive 300
maxclients 1000

# --- Keyspace Notification (for expiry events) ---
notify-keyspace-events ""

# --- Latency ---
latency-monitor-threshold 100

# --- TLS (enable in production with valid certs) ---
# tls-port 6380
# tls-cert-file /tls/redis.crt
# tls-key-file /tls/redis.key
# tls-ca-cert-file /tls/ca.crt
