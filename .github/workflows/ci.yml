name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest pytest-asyncio fastapi uvicorn starlette pydantic pydantic-settings python-dotenv PyYAML asyncpg SQLAlchemy qdrant-client confluent-kafka minio httpx

      - name: Run Ruff Linter
        run: ruff check .

      - name: Run Mypy Type Checker
        run: mypy .

      - name: Run Pytest Test Suite
        run: pytest -v

  docker-dry-run:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Dry-run Camera Service Build
        run: docker build -t camera-service:test -f apps/camera-service/Dockerfile .
