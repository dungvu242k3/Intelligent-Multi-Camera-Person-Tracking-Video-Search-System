# =====================================================================
# DeepStream Application Configuration (non-Triton local TensorRT mode)
# Used when running with nvinfer directly against compiled .engine files
# =====================================================================

application:
  enable-perf-measurement: 1
  perf-measurement-interval-sec: 5

tiled-display:
  enable: 0            # Disabled — headless production mode

source-list:
  # Populated dynamically at runtime via --source CLI args
  # Example: rtsp://camera1:554/stream or file:///data/video.mp4
  num-sources: 1
  uri-list: []

sink-list:
  sink0:
    enable: 1
    type: 1            # 1 = fakesink (headless)
    sync: 0
    qos: 0

primary-gie:
  enable: 1
  batch-size: 4
  interval: 0
  gie-unique-id: 1
  config-file-path: configs/pgie_yolov8.txt

tracker:
  enable: 1
  tracker-width: 640
  tracker-height: 384
  ll-lib-file: /opt/nvidia/deepstream/deepstream/lib/libnvds_nvmultiobjecttracker.so
  ll-config-file: configs/tracker_config.yml
  enable-batch-process: 1

secondary-gie-sub-batches:
  - secondary-gie0:
      enable: 1
      batch-size: 16
      interval: 0
      gie-unique-id: 2
      operate-on-gie-id: 1
      operate-on-class-ids: "0"    # Persons only
      config-file-path: configs/sgie_reid.txt

osd:
  enable: 0            # Disabled — headless production mode

streammux:
  gpu-id: 0
  batch-size: 4
  width: 1920
  height: 1080
  batched-push-timeout: 40000
  live-source: 1
  enable-padding: 0
